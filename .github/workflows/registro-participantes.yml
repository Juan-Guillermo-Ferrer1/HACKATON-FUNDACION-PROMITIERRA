name: Registro de Participantes

on:
  issues:
    types: [opened, edited, closed]

jobs:
  registro:
    if: startsWith(github.event.issue.title, '[INSCRIPCIÓN]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ACTION: ${{ github.event.action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract participant data and update JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ACTION: ${{ github.event.action }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import re

          body = os.environ.get('ISSUE_BODY', '')
          title = os.environ.get('ISSUE_TITLE', '')
          action = os.environ.get('ACTION', '')

          equipo = title.replace('[INSCRIPCIÓN] - ', '').strip()

          filepath = 'Participantes/participantes.json'
          existing = []
          if os.path.exists(filepath):
            with open(filepath, 'r') as f:
              existing = json.load(f)

          # Si el issue se cierra, eliminar participante
          if action == 'closed':
            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            print(f"Participante eliminado: {equipo}")
          else:
            # Agregar o actualizar participante
            participantes = []
            nombre_integrantes = []
            correo = ''
            categoria = ''
            experiencia = ''

            lines = body.split('\n')
            current_field = None

            for line in lines:
              if 'Nombre del Equipo' in line or 'Equipo/Participante' in line:
                current_field = 'equipo'
              elif 'Nombre de los Integrantes' in line or 'Integrantes' in line:
                current_field = 'integrantes'
              elif 'Correo' in line:
                current_field = 'correo'
              elif 'Categoría' in line or 'Categoria' in line:
                current_field = 'categoria'
              elif 'experiencia' in line.lower() or 'programando' in line.lower():
                current_field = 'experiencia'
              elif line.strip().startswith('- ['):
                if current_field == 'categoria' and 'x' in line:
                  match = re.search(r'\[x\]\s*(.+)', line)
                  if match:
                    categoria = match.group(1).strip()
                elif current_field == 'experiencia' and 'x' in line:
                  match = re.search(r'\[x\]\s*(.+)', line)
                  if match:
                    experiencia = match.group(1).strip()
              elif line.strip() and not line.strip().startswith('#') and not line.strip().startswith('-'):
                value = line.strip()
                if current_field == 'integrantes' and value:
                  nombre_integrantes.append(value)
                elif current_field == 'correo' and not correo and '@' in value:
                  correo = value

            data = {
              'equipo': equipo,
              'integrantes': nombre_integrantes,
              'correo': correo,
              'categoria': categoria,
              'experiencia': experiencia,
              'fecha_inscripcion': '${{ github.event.issue.created_at }}',
              'issue_url': '${{ github.event.issue.html_url }}'
            }

            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            existing.append(data)
            print(f"Participante registrado: {equipo}")

          with open(filepath, 'w') as f:
            json.dump(existing, f, indent=2, ensure_ascii=False)

          readme_content = "# Participantes Registrados\n\n| # | Equipo | Integrantes | Correo | Categoria | Experiencia | Fecha |\n|---|--------|-------------|--------|-----------|-------------|-------|\n"
          for i, p in enumerate(existing):
            integrantes = ', '.join(p.get('integrantes', []))
            fecha = p.get('fecha_inscripcion', '')[:10]
            readme_content += f"| {i+1} | {p.get('equipo', '')} | {integrantes} | {p.get('correo', '')} | {p.get('categoria', '')} | {p.get('experiencia', '')} | {fecha} |\n"

          readme_content += "\n*Esta lista se actualiza automaticamente cuando un participante se registra mediante un issue.*\n"

          with open('Participantes/README.md', 'w') as f:
            f.write(readme_content)

          print(f"Total participantes: {len(existing)}")
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Participantes/participantes.json Participantes/README.md
          git diff --staged --quiet || git commit -m "Actualizar participante de issue #${{ github.event.issue.number }}"
          git push