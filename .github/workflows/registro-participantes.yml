name: Registro de Participantes

on:
  issues:
    types: [opened, edited, closed]

jobs:
  registro:
    if: startsWith(github.event.issue.title, '[INSCRIPCIÓN]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      ACTION: ${{ github.event.action }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Extract participant data and update JSON
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ACTION: ${{ github.event.action }}
        run: |
          python3 << 'EOF'
          import json
          import os
          import re

          body = os.environ.get('ISSUE_BODY', '')
          title = os.environ.get('ISSUE_TITLE', '')
          action = os.environ.get('ACTION', '')

          equipo = title.replace('[INSCRIPCIÓN] - ', '').strip()

          filepath = 'Participantes/participantes.json'
          existing = []
          if os.path.exists(filepath):
            with open(filepath, 'r') as f:
              existing = json.load(f)

          # Si el issue se cierra, eliminar participante
          if action == 'closed':
            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            print(f"Participante eliminado: {equipo}")
          else:
            # Agregar o actualizar participante
            nombre_integrantes = []
            correo = ''
            institucion = ''
            edades = ''
            skills = ''
            categoria = ''
            experiencia = ''

            lines = body.split('\n')
            data = {
                'equipo': equipo,
                'integrantes': [],
                'correo': '',
                'institucion': '',
                'edades': '',
                'skills': '',
                'categoria': '',
                'experiencia': ''
            }
            
            field_mapping = {
                'Nombre del Equipo': 'equipo',
                'Nombre de los Integrantes': 'integrantes',
                'Correo de contacto': 'correo',
                'Institución / Colegio / Universidad': 'institucion',
                'Edades de los integrantes': 'edades',
                'Skills / Conocimientos': 'skills',
                'Categoría de participación': 'categoria',
                '¿Ya tienes experiencia programando?': 'experiencia'
            }
            
            for line in lines:
                line = line.strip()
                for field_name, field_key in field_mapping.items():
                    if line == f'## {field_name}' or line == f'## {field_name}\r':
                        current_field = field_key
                        break
                else:
                    if line.startswith('- [x]'):
                        value = line.replace('- [x]', '').strip()
                        if current_field in ['categoria', 'experiencia']:
                            data[current_field] = value
                    elif line and not line.startswith('## ') and not line.startswith('- [ ]'):
                        if current_field == 'integrantes':
                            data['integrantes'].append(line)
                        elif current_field and line:
                            data[current_field] = line
            
            nombre_integrantes = data['integrantes']
            correo = data['correo']
            institucion = data['institucion']
            edades = data['edades']
            skills = data['skills']
            categoria = data['categoria']
            experiencia = data['experiencia']

            data = {
              'equipo': equipo,
              'integrantes': nombre_integrantes,
              'correo': correo,
              'institucion': institucion,
              'edades': edades,
              'skills': skills,
              'categoria': categoria,
              'experiencia': experiencia,
              'fecha_inscripcion': '${{ github.event.issue.created_at }}',
              'issue_url': '${{ github.event.issue.html_url }}'
            }

            existing = [p for p in existing if p.get('equipo', '').lower() != equipo.lower()]
            existing.append(data)
            print(f"Participante registrado: {equipo}")

          with open(filepath, 'w') as f:
            json.dump(existing, f, indent=2, ensure_ascii=False)

          readme_content = "# Participantes Registrados\n\n| # | Equipo | Integrantes | Institucion | Edades | Skills | Correo | Categoria | Experiencia | Fecha |\n|---|--------|-------------|-------------|--------|--------|--------|-----------|-------------|-------|\n"
          for i, p in enumerate(existing):
            integrantes = ', '.join(p.get('integrantes', []))
            fecha = p.get('fecha_inscripcion', '')[:10]
            readme_content += f"| {i+1} | {p.get('equipo', '')} | {integrantes} | {p.get('institucion', '')} | {p.get('edades', '')} | {p.get('skills', '')} | {p.get('correo', '')} | {p.get('categoria', '')} | {p.get('experiencia', '')} | {fecha} |\n"

          readme_content += "\n*Esta lista se actualiza automaticamente cuando un participante se registra mediante un issue.*\n"

          with open('Participantes/README.md', 'w') as f:
            f.write(readme_content)

          print(f"Total participantes: {len(existing)}")
          EOF

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Participantes/participantes.json Participantes/README.md
          git diff --staged --quiet || git commit -m "Actualizar participante de issue #${{ github.event.issue.number }}"
          git push